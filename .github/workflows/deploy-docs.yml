name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'developer-portal/**'
      - 'docs/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './developer-portal/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./developer-portal
        run: npm ci
        
      - name: Build site
        working-directory: ./developer-portal
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './developer-portal/build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
